kind = "web"
previewPath = "/"
title = "Royal Frame Weddings"
version = "1.0.0"
id = "artifacts/royal-frame-weddings"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19110
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/royal-frame-weddings run dev"

[services.env]
PORT = "19110"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/royal-frame-weddings", "run", "build"]
publicDir = "artifacts/royal-frame-weddings/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
